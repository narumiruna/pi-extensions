name: CI

on:
  push:
    branches:
      - main
  pull_request:
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check and test against the latest Pi packages
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Set up npm
        run: |
          npm install -g npm@11.16.0
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Install latest Pi packages
        run: |
          node scripts/set-pi-version.mjs latest
          npm install --no-save

      - name: Run checks and tests
        run: npm run check
