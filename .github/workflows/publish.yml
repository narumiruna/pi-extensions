name: Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ref
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Setup npm
        run: |
          npm install -g npm@11.16.0
          npm --version
          node -e 'require.resolve("sigstore", { paths: [process.argv[1]] })' "$(npm root -g)/npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify packages
        run: npm run check

      - name: Select workspace packages
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "push" ]]; then
            node scripts/list-publish-workspaces.mjs --release "$RELEASE_TAG" > /tmp/pi-workspaces.tsv
          else
            node scripts/list-publish-workspaces.mjs --all > /tmp/pi-workspaces.tsv
          fi

          if [[ -s /tmp/pi-workspaces.tsv ]]; then
            echo "Selected workspace packages:"
            while IFS=$'\t' read -r package version; do
              echo "- ${package}@${version}"
            done < /tmp/pi-workspaces.tsv
          else
            echo "No workspace packages selected for publishing."
          fi

      - name: Publish unpublished workspace packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail

          while IFS=$'\t' read -r package version; do
            if [[ -z "$package" || -z "$version" ]]; then
              continue
            fi

            if npm view "${package}@${version}" version >/dev/null 2>&1; then
              echo "${package}@${version} already exists; skipping publish."
              continue
            fi

            echo "Publishing ${package}@${version}..."
            npm --workspace "$package" publish --access public --loglevel verbose
          done < /tmp/pi-workspaces.tsv
