name: Bump version

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: SemVer bump to apply
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
        default: patch

permissions:
  contents: write

concurrency:
  group: bump-version-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  bump-version:
    name: Bump package versions and create a tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out target branch
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Set up npm
        run: |
          npm install -g npm@11.16.0
          npm --version

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update versions, commit changes, and create a tag
        id: version
        run: |
          set -euo pipefail

          new_version="$(node scripts/bump-shared-version.mjs "${{ inputs.version_bump }}" | tail -n 1)"
          tag="v${new_version}"

          git add package.json package-lock.json extensions/*/package.json
          git commit -m "chore(release): ${tag}"
          git tag "${tag}"

          echo "new_version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Push commit and tag
        run: |
          git push origin "HEAD:${{ github.ref_name }}"
          git push origin "${{ steps.version.outputs.tag }}"
